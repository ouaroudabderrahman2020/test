<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE CAR V9.2 - KM TRACKING</title>
    <style>
        :root { 
            --primary: #2c3e50; --orange: #e67e22; --green: #2ecc71; 
            --red: #ffcdd2; --dark-red: #b71c1c; --blue: #3498db; --light-orange: #fff4e6;
            --border-color: #333;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; color: #000; overflow-x: hidden; }

        .header-section { background: white; padding: 15px; border-bottom: 3px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        .logo-row { text-align: center; margin-bottom: 10px; }
        .main-logo { height: 80px; width: auto; }
        @media (min-width: 768px) { .main-logo { height: 120px; } }

        .status-row { display: flex; align-items: center; justify-content: center; gap: 15px; flex-wrap: wrap; padding: 10px; }
        .clock-display { background: white; border: 2px solid #eee; padding: 5px 15px; border-radius: 8px; text-align: center; font-weight: bold; min-width: 140px; }
        
        #sync-text { font-weight: 900; font-size: 18px; transition: 0.3s; }
        .status-pulse { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .table-wrapper { padding: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: collapse; background: white; min-width: 3400px; border: 3px solid var(--border-color); }
        th { background: var(--primary); color: white; padding: 12px; border: 1px solid #fff; text-transform: uppercase; font-size: 13px; position: sticky; top: 0; }
        td { border: 1px solid var(--border-color); padding: 2px; text-align: center; height: 50px; font-size: 16px; font-weight: 700; }
        
        input, select { border: none; width: 100%; box-sizing: border-box; font-size: 16px; font-weight: 700; outline: none; background: transparent; text-align: center; color: inherit; padding: 10px 2px; }

        .row-overdue { background-color: var(--red) !important; color: var(--dark-red) !important; } 
        .row-reserved { background-color: #b3e5fc !important; } 
        .row-partial { background-color: #fff9c4 !important; }  
        .row-active { background-color: #c8e6c9 !important; }   
        .col-orange { background-color: var(--light-orange) !important; }

        .up-loading { font-size: 10px; color: var(--blue); animation: blink 1s infinite; display: none; }
        @keyframes blink { 50% { opacity: 0; } }
        .btn-up { background: var(--blue); color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-finish { background: var(--primary); color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }

        .console { background: #2c3e50; color: white; padding: 30px 15px; margin-top: 20px; }
        .search-grid { display: flex; flex-direction: column; gap: 15px; align-items: center; justify-content: center; }
        @media (min-width: 768px) { .search-grid { flex-direction: row; } }
        .search-box { background: white; padding: 10px; border-radius: 8px; color: black; display: flex; gap: 10px; align-items: center; min-width: 280px; }
        .btn-search { background: var(--blue); color: white; border: none; padding: 12px 35px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-reset { background: #e74c3c; color: white; border: none; padding: 12px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        .btn-tools, .btn-lang {
            background: #2c3e50;
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            border: 2px solid #eee;
            transition: 0.3s;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-tools:hover, .btn-lang:hover {
            background: #34495e;
            border-color: var(--blue);
        }
    </style>
</head>
<body onbeforeunload="return handleExit()">

<div class="header-section">
    <div class="logo-row"><img src="logo.jpg" alt="ELITE" class="main-logo"></div>
    <div class="status-row">
        <a href="https://glamcarsnador.github.io/utility-website/" target="_blank" rel="noopener noreferrer" class="btn-tools" id="lbl-tools">TOOLS</a>
        <button class="btn-lang" onclick="toggleLanguage()" id="btn-lang-toggle">🌐 EN / FR / AR</button>
        <div class="clock-display">
            <div id="live-date">--/--/--</div>
            <div id="live-clock" style="color: var(--orange); font-size: 20px;">00:00:00</div>
        </div>
        <div>
            <span id="sync-dot" style="color:#2ecc71">●</span> 
            <span id="sync-text" style="color:#2ecc71">LIVE</span>
        </div>
    </div>
</div>

<div class="table-wrapper">
    <table>
        <thead id="mainTableHeader">
            </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div class="console">
    <h2 style="margin-bottom: 20px;" id="lbl-history-title">HISTORY SEARCH</h2>
    <div class="search-grid">
        <div class="search-box">
            <label style="font-size:10px; color:gray;" id="lbl-search-data">DATA</label>
            <input type="text" id="uSearch" placeholder="NAME, PHONE, CAR..." style="text-align:left;">
        </div>
        <div class="search-box">
            <label style="font-size:10px; color:gray;" id="lbl-search-from">FROM</label><input type="text" id="dateStart" placeholder="dd/mm/yy" style="width:80px;">
            <label style="font-size:10px; color:gray;" id="lbl-search-to">TO</label><input type="text" id="dateEnd" placeholder="dd/mm/yy" style="width:80px;">
        </div>
        <button class="btn-search" id="btn-search-run" onclick="runHistorySearch()">SEARCH</button>
        <button class="btn-reset" id="btn-search-reset" onclick="clearHistorySearch()">RESET</button>
    </div>
    <div style="margin-top: 15px; font-weight: bold;"><span id="search-status">READY</span></div>

    <div class="table-wrapper" style="margin-top:20px; background:white; color:black;">
        <table id="historyTable">
            <thead id="historyTableHeader">
                </thead>
            <tbody id="resBody"></tbody>
        </table>
    </div>
</div>

<script>

                "DATE DÉPART", "HEURE DÉPART", "DATE RETOUR", "PROLONG. DATE", "HEURE RETOUR", "JOURS", "PRIX/JOUR",
                "TOTAL", "AVANCE", "RESTE", "KM DÉPART", "KM RETOUR", "ÉTAT", "CLASSEMENT", "NOTES", "ACTIONS"
            ],

                "DATE DÉPART", "HEURE DÉPART", "DATE RETOUR", "PROLONG. DATE", "HEURE RETOUR", "JOURS", "PRIX/JOUR",
                "TOTAL", "AVANCE", "RESTE", "KM DÉPART", "KM RETOUR", "ÉTAT", "CLASSEMENT", "NOTES", "ARCHIVÉ LE"
            ]
        },
        ar: {
            tools: "الأدوات",
            historyTitle: "البحث في الأرشيف",
            searchData: "البيانات",
            searchFrom: "من",
            searchTo: "إلى",

            confirmArchive: "هل تريد النقل إلى الأرشيف؟",
            btnUpload: "رفع ملف",
            lblUploading: "جاري الرفع...",
            btnFinish: "إنهاء",
            stateActive: "نشط/مدفوع",
            stateReserved: "محجوز",
            statePartial: "دفع جزئي",
            headers: [
                "السيارة", "رقم اللوحة", "اسم الزبون", "الهاتف", "رقم البطاقة الوطنية", "رخصة السياقة", "الوثائق",
                "تاريخ الخروج", "ساعة الخروج", "تاريخ الدخول", "تاريخ التمديد", "ساعة الدخول", "الأيام", "سعر اليوم",
                "المجموع", "تسبق", "المتبقي", "عداد الخروج", "عداد الدخول", "الحالة", "التقييم", "ملاحظات", "إجراءات"
            ],
            historyHeaders: [
                "السيارة", "رقم اللوحة", "اسم الزبون", "الهاتف", "رقم البطاقة الوطنية", "رخصة السياقة", "الوثائق",
                "تاريخ الخروج", "ساعة الخروج", "تاريخ الدخول", "تاريخ التمديد", "ساعة الدخول", "الأيام", "سعر اليوم",
                "المجموع", "تسبق", "المتبقي", "عداد الخروج", "عداد الدخول", "الحالة", "التقييم", "ملاحظات", "أرشفة في"
            ]
        }
    };

    function toggleLanguage() {
        let nextIndex = (languages.indexOf(currentLang) + 1) % languages.length;
        currentLang = languages[nextIndex];
        applyTranslations();
    }

    function applyTranslations() {
        const trans = translations[currentLang];
        
        // Translate stable application interface items
        document.getElementById('lbl-tools').innerText = trans.tools;
        document.getElementById('lbl-history-title').innerText = trans.historyTitle;
        document.getElementById('lbl-search-data').innerText = trans.searchData;
        document.getElementById('lbl-search-from').innerText = trans.searchFrom;
        document.getElementById('lbl-search-to').innerText = trans.searchTo;
        document.getElementById('btn-search-run').innerText = trans.btnSearch;
        document.getElementById('btn-search-reset').innerText = trans.btnReset;
        document.getElementById('uSearch').placeholder = trans.placeholderSearch;
        
        const searchStatus = document.getElementById('search-status');
        if (searchStatus.innerText === "READY" || searchStatus.innerText === "PRÊT" || searchStatus.innerText === "جاهز") {
            searchStatus.innerText = trans.statusReady;
        }

        // Render Table Headers safely
        const mainHeader = document.getElementById('mainTableHeader');
        mainHeader.innerHTML = `<tr>${trans.headers.map(h => `<th>${h}</th>`).join('')}</tr>`;

        const historyHeader = document.getElementById('historyTableHeader');
        historyHeader.innerHTML = `<tr>${trans.historyHeaders.map(h => `<th>${h}</th>`).join('')}</tr>`;

        // Update inline table buttons labels on translation click without full structural redraw
        document.querySelectorAll('.btn-finish').forEach(btn => btn.innerText = trans.btnFinish);
        document.querySelectorAll('.btn-up').forEach(btn => btn.innerText = trans.btnUpload);
        document.querySelectorAll('.up-loading').forEach(div => div.innerText = trans.lblUploading);

        // Update select option texts dynamically while retaining data integrity
        document.querySelectorAll('.state-selector').forEach(sel => {
            const currentSelectedValue = sel.value; 
            sel.options[1].text = trans.stateActive;
            sel.options[2].text = trans.stateReserved;
            sel.options[3].text = trans.statePartial;
            sel.value = currentSelectedValue; 
        });
    }

    function handleExit() {
        if (isSaving) {
            return "Wait! Data is currently being saved to the server.";
        }
    }

    async function init() {
        applyTranslations(); 
        fetch('https://worldtimeapi.org/api/timezone/Africa/Casablanca').then(r => r.json()).then(d => { if(d) officialTime = new Date(d.datetime); });
        try {
            const res = await fetch(SCRIPT_URL);
            currentData = await res.json();
            renderTable();
        } catch(e) { updateStatus("OFFLINE", "#e74c3c"); }

        setInterval(() => {
            officialTime.setSeconds(officialTime.getSeconds() + 1);
            document.getElementById('live-date').innerText = formatEliteDate(officialTime);
            document.getElementById('live-clock').innerText = officialTime.toLocaleTimeString('fr-FR', {hour12: false});
            processRowColors();
        }, 1000);
    }

    function formatEliteDate(d) {
        if(!d || isNaN(d)) return "";
        return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}`;
    }

    function parseEliteDate(s) {
        if(!s || s.length < 8) return null;
        const [d, m, y] = s.split('/').map(Number);
        return new Date(2000+y, m-1, d);
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        const trans = translations[currentLang];
        
        for (let i = 1; i < currentData.length; i++) {
            const row = currentData[i];
            const tr = document.createElement('tr');
            tr.id = `row-${i}`;
            tr.innerHTML = `
                <td class="col-orange"><input value="${row[0]||''}" onchange="upd(${i},0,this.value)"></td>
                <td class="col-orange"><input value="${row[1]||''}" onchange="upd(${i},1,this.value)"></td>
                <td><input value="${row[2]||''}" onchange="upd(${i},2,this.value)"></td>
                <td><input value="${row[3]||''}" onchange="upd(${i},3,this.value)"></td>
                <td><input value="${row[4]||''}" onchange="upd(${i},4,this.value)"></td>
                <td><input value="${row[5]||''}" onchange="upd(${i},5,this.value)"></td>
                <td>
                    <button class="btn-up" onclick="document.getElementById('up-${i}').click()">${trans.btnUpload}</button>
                    <div id="up-ld-${i}" class="up-loading">${trans.lblUploading}</div>
                    <input type="file" id="up-${i}" hidden onchange="handleUpload(${i}, this)">
                    ${row[6] ? `<a href="${row[6]}" target="_blank" style="font-size:20px;">📄</a>` : ''}
                </td>
                <td><input value="${row[7]||''}" placeholder="dd/mm/yy" onchange="upd(${i},7,this.value)"></td>
                <td><input value="${row[8]||''}" placeholder="hh:mm" onchange="upd(${i},8,this.value)"></td>
                <td><input value="${row[9]||''}" placeholder="dd/mm/yy" onchange="upd(${i},9,this.value)"></td>
                <td><input value="${row[10]||''}" placeholder="dd/mm/yy" onchange="upd(${i},10,this.value)"></td>
                <td><input value="${row[11]||''}" placeholder="hh:mm" onchange="upd(${i},11,this.value)"></td>
                <td><input value="${row[12]||''}" onchange="upd(${i},12,this.value)"></td>
                <td><input value="${row[13]||''}" onchange="upd(${i},13,this.value)"></td>
                <td><input value="${row[14]||''}" onchange="upd(${i},14,this.value)"></td>
                <td><input value="${row[15]||''}" onchange="upd(${i},15,this.value)"></td>
                <td><input value="${row[16]||''}" onchange="upd(${i},16,this.value)"></td>
                <td><input value="${row[17]||''}" onchange="upd(${i},17,this.value)"></td>
                <td><input value="${row[18]||''}" onchange="upd(${i},18,this.value)"></td>
                <td>
                    <select class="state-selector" onchange="upd(${i},19,this.value)">
                        <option value="" ${row[19]==''?'selected':''}>-</option>
                        <option value="ACTIVE/PAID" ${row[19]=='ACTIVE/PAID'?'selected':''}>${trans.stateActive}</option>
                        <option value="RESERVED" ${row[19]=='RESERVED'?'selected':''}>${trans.stateReserved}</option>
                        <option value="PARTIAL" ${row[19]=='PARTIAL'?'selected':''}>${trans.statePartial}</option>
                    </select>
                </td>
                <td>
                    <select onchange="upd(${i},20,this.value)" style="color:#f1c40f; font-size:18px;">
                        <option value="1" ${row[20]=='1'?'selected':''}>★</option>
                        <option value="2" ${row[20]=='2'?'selected':''}>★★</option>
                        <option value="3" ${row[20]=='3'?'selected':''}>★★★</option>
                        <option value="4" ${row[20]=='4'?'selected':''}>★★★★</option>
                        <option value="5" ${row[20]=='5'?'selected':''}>★★★★★</option>
                    </select>
                </td>
                <td><input value="${row[21]||''}" onchange="upd(${i},21,this.value)"></td>
                <td><button class="btn-finish" onclick="archiveRow(${i})">${trans.btnFinish}</button></td>
            `;
            tbody.appendChild(tr);
        }
    }

    function processRowColors() {
        for (let i = 1; i < currentData.length; i++) {
            const tr = document.getElementById(`row-${i}`);
            if(!tr) continue;
            let cls = "";
            const row = currentData[i];
            const end = parseEliteDate(row[10] || row[9]);
            if(end && row[2]) {
                const [h, m] = (row[11] || "00:00").split(':').map(Number);
                end.setHours(h || 0, m || 0, 0);
                if(end < officialTime) cls = "row-overdue";
            }
            if(!cls) {
                if(row[19] === "RESERVED") cls = "row-reserved";
                else if(row[19] === "PARTIAL") cls = "row-partial";
                else if(row[19] === "ACTIVE/PAID") cls = "row-active";
            }
            if(tr.className !== cls) tr.className = cls;
        }
    }

    function upd(r, c, v) { currentData[r][c] = v; sync(); }

    async function sync() {
        isSaving = true;
        updateStatus("SAVING...", "#f39c12");
        
        // Clean array data to exactly 22 items per row to comply with Google Script getRange bound limits
        const cleanedData = currentData.map(row => {
            const subRow = row.slice(0, 22);
            while(subRow.length < 22) subRow.push("");
            return subRow;
        });

        try {
            await fetch(SCRIPT_URL, { 
                method: "POST", 
                body: JSON.stringify({ token: AUTH_TOKEN, action: "saveAll", data: cleanedData }) 
            });
            updateStatus("LIVE", "#2ecc71");
            isSaving = false;
        } catch(e) { 
            updateStatus("ERROR - RETRYING...", "#e74c3c"); 
            setTimeout(sync, 2000);
        }
    }

    async function handleUpload(i, input) {
        const file = input.files[0];
        if(!file) return;
        isSaving = true;
        document.getElementById(`up-ld-${i}`).style.display = "block";
        updateStatus("UPLOADING...", "#3498db");
        const reader = new FileReader();
        reader.onload = async (e) => {
            const base64 = e.target.result.split(',')[1];
            const res = await fetch(SCRIPT_URL, { 
                method: "POST", 
                body: JSON.stringify({ token: AUTH_TOKEN, action: "upload", row: i, filename: file.name, mimeType: file.type, base64: base64 })
            });
            currentData[i][6] = await res.text();
            document.getElementById(`up-ld-${i}`).style.display = "none";
            isSaving = false;
            updateStatus("LIVE", "#2ecc71");
            renderTable();
        };
        reader.readAsDataURL(file);
    }

    async function runHistorySearch() {
        const status = document.getElementById('search-status');
        const trans = translations[currentLang];
        status.innerText = trans.statusSearching; status.style.color = "#f39c12";
        
        const q = document.getElementById('uSearch').value.toLowerCase();
        const sD = parseEliteDate(document.getElementById('dateStart').value);
        const eD = parseEliteDate(document.getElementById('dateEnd').value);
        
        const res = await fetch(SCRIPT_URL, { 
            method: "POST", 
            body: JSON.stringify({ token: AUTH_TOKEN, action: "getHistory" }) 
        });
        const history = await res.json();
        const filtered = history.filter((r, idx) => {
            if(idx === 0) return false;
            const textMatch = q === "" || r.some(c => String(c).toLowerCase().includes(q));
            const rOut = parseEliteDate(r[7]);
            const rIn = parseEliteDate(r[10]||r[9]);
            let dateMatch = true;
            if(sD && eD && rOut && rIn) {
                sD.setHours(0,0,0); eD.setHours(23,59,59);
                dateMatch = (rOut <= eD && rIn >= sD);
            }
            return textMatch && dateMatch;
        });

        // Mapping search results cleanly with accurate localized lookup for state option tags
        document.getElementById('resBody').innerHTML = filtered.map(r => {
            let stateLabel = r[19] || '';
            if (r[19] === "ACTIVE/PAID") stateLabel = trans.stateActive;
            else if (r[19] === "RESERVED") stateLabel = trans.stateReserved;
            else if (r[19] === "PARTIAL") stateLabel = trans.statePartial;

            return `
                <tr>
                    <td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td>
                    <td>${r[6]?'<a href="'+r[6]+'" target="_blank">📄</a>':''}</td>
                    <td>${r[7]}</td><td>${r[8]}</td><td>${r[9]}</td><td>${r[10]}</td><td>${r[11]}</td>
                    <td>${r[12]}</td><td>${r[13]}</td><td>${r[14]}</td><td>${r[15]}</td><td>${r[16]}</td>
                    <td>${r[17]}</td><td>${r[18]}</td>
                    <td>${stateLabel}</td><td style="color:#f1c40f">${'★'.repeat(parseInt(r[20])||0)}</td><td>${r[21]}</td><td>${r[22]||''}</td>
                </tr>
            `;
        }).join('');
        status.innerText = filtered.length + trans.statusResults; status.style.color = "#2ecc71";
    }

    function clearHistorySearch() {
        const trans = translations[currentLang];
        document.getElementById('uSearch').value = "";
        document.getElementById('dateStart').value = "";
        document.getElementById('dateEnd').value = "";
        document.getElementById('resBody').innerHTML = "";
        document.getElementById('search-status').innerText = trans.statusReady;
        document.getElementById('search-status').style.color = "white";
    }

    async function archiveRow(i) {
        const trans = translations[currentLang];
        if(confirm(trans.confirmArchive)) {
            isSaving = true;
            updateStatus("ARCHIVING...", "#f39c12");
            
            // Clean individual row data to exactly 22 elements before submitting to archive payload
            const rowToArchive = currentData[i].slice(0, 22);
            while(rowToArchive.length < 22) rowToArchive.push("");

            await fetch(SCRIPT_URL, { 
                method: "POST", 
                body: JSON.stringify({ token: AUTH_TOKEN, action: "archive", row: i, data: rowToArchive, officialTime: officialTime.toISOString() })
            });
            isSaving = false;
            location.reload();
        }
    }

    function updateStatus(t, c) { 
        const txt = document.getElementById('sync-text');
        const dot = document.getElementById('sync-dot');
        txt.innerText = t; txt.style.color = c; dot.style.color = c;
        if(t.includes("...")) txt.classList.add("status-pulse");
        else txt.classList.remove("status-pulse");
    }
    init();
</script>
</body>
</html>
